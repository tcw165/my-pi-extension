services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-your-secure-api-key-here}
    networks:
      - vector-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional: Ollama for local embeddings (uncomment to enable)
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - vector-db
  #   environment:
  #     OLLAMA_HOST: "0.0.0.0:11434"
  #   restart: unless-stopped

volumes:
  qdrant_data:
    driver: local
  # ollama_data:
  #   driver: local

networks:
  vector-db:
    driver: bridge
